name: Render Scoreboard

on:
  push:
    branches: [main]
    paths:
      - 'docs/scores/*.json'

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup codelord
        uses: ./.github/actions/setup-codelord

      - name: Render scores.md from per-benchmark JSONs
        run: pnpm update-scores --render

      - name: Commit rendered scoreboard
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/scores.md
          if git diff --cached --quiet; then
            echo "No changes to scores.md"
          else
            git commit -m "[eval] Render scoreboard from updated scores"
            git push
          fi
