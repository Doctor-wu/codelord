name: Eval Polyglot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: subset 或 full
        required: true
        default: subset
        type: choice
        options:
          - subset
          - full
      limit:
        description: subset 模式下的 case 数量（full 模式留空）
        required: false
        default: ''
        type: string
      languages:
        description: 逗号分隔的语言列表（空 = 全部）
        required: false
        default: ''
        type: string

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      CODELORD_PROVIDER: anthropic
      CODELORD_MODEL: claude-sonnet-4-6
      CODELORD_REASONING_LEVEL: low
      CODELORD_API_KEY: ${{ secrets.CODELORD_API_KEY }}
      CODELORD_BASE_URL: ${{ secrets.CODELORD_BASE_URL }}
      RESULT_PATH: ${{ github.workspace }}/evals/polyglot/data/results/results.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup codelord
        uses: ./.github/actions/setup-codelord

      - name: Run Polyglot eval
        id: run_eval
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p "$(dirname "$RESULT_PATH")"

          ARGS=()
          if [ "${{ inputs.mode }}" = "subset" ] && [ -n "${{ inputs.limit }}" ]; then
            ARGS+=(--limit "${{ inputs.limit }}")
          fi
          if [ -n "${{ inputs.languages }}" ]; then
            ARGS+=(--languages "${{ inputs.languages }}")
          fi
          ARGS+=(--output "$RESULT_PATH")

          ./evals/polyglot/scripts/docker-build.sh
          ./evals/polyglot/scripts/docker-run.sh "${ARGS[@]}"
          EXIT_CODE=$?

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render job summary
        if: always() && hashFiles('evals/polyglot/data/results/results.json') != ''
        shell: bash
        run: |
          pnpm --filter @codelord/evals-shared render-summary --input "$RESULT_PATH" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload result artifact
        if: always() && hashFiles('evals/polyglot/data/results/results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: polyglot-results-${{ github.run_id }}
          path: ${{ env.RESULT_PATH }}
          if-no-files-found: error

      - name: Fail on runtime error
        if: always()
        shell: bash
        run: |
          if [ ! -f "$RESULT_PATH" ]; then
            echo "results.json was not produced"
            exit 1
          fi

          node --input-type=module - <<'NODE'
          import fs from 'node:fs'
          const result = JSON.parse(fs.readFileSync(process.env.RESULT_PATH, 'utf8'))
          if (Array.isArray(result.errors) && result.errors.length > 0) {
            console.error('Benchmark encountered runtime errors.')
            process.exit(1)
          }
          NODE
